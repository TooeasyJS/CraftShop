kind = "web"
previewPath = "/"
title = "Craft Shop®"
version = "1.0.0"
id = "artifacts/craft-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19869

[services.development]
run = "pnpm --filter @workspace/craft-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/craft-shop", "run", "build" ]
publicDir = "artifacts/craft-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19869"
BASE_PATH = "/"
